<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />

    <!-- Fallback title. React Helmet overrides this per route. -->
    <!-- <title>
      פאנס/פאנדס ישראל | PANS/PANDAS Israel | העמותה הישראלית לאנצפליטיס
      אוטואימוני
    </title> -->

    <meta
      name="author"
      content="פאנס/פאנדס ישראל - PANS/PANDAS Israel Community" />

    <!-- Language and region -->
    <meta name="language" content="Hebrew" />
    <meta name="geo.region" content="IL" />
    <meta name="geo.placename" content="Israel" />

    <!-- Fallback image metadata. React Helmet overrides route-specific social tags. -->
    <meta property="og:image" content="https://panspandasil.org/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="פאנס/פאנדס ישראל - קהילת הורים" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Theme color -->
    <meta name="theme-color" content="#6c5ce7" />
    <meta name="msapplication-TileColor" content="#6c5ce7" />
    <meta name="color-scheme" content="light dark" />

    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured Data for Google JSON-LD -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "פאנס/פאנדס ישראל",
        "alternateName": "PANS/PANDAS Israel",
        "url": "https://panspandasil.org",
        "logo": "https://panspandasil.org/logo.png",
        "description": "קהילת תמיכה להורים לילדים עם תסמונות PANDAS ו-PANS בישראל",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "IL"
        },
        "sameAs": [
          "https://www.facebook.com/profile.php?id=61589380803440"
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
